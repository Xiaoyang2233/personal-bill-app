name: finance_app
description: 个人账单记账APP - 纯离线Flutter应用
publish_to: 'none'
version: 1.1.4+6

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.3.0
  path_provider: ^2.1.1
  path: ^1.8.3
  shared_preferences: ^2.2.2
  provider: ^6.1.1
  fl_chart: ^0.66.0
  image_picker: ^1.0.7
  file_picker: ^8.0.0
  share_plus: ^7.2.1
  csv: ^6.0.0
  excel: ^4.0.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - qq_avatar.jpg

flutter_launcher_icons:
  android:
    generate: true
    image_path: "应用图标人物1.png"
    adaptive_icon_background: null
    adaptive_icon_foreground: "应用图标人物1.png"
  ios: true
  image_path: "应用图标人物1.png"
  remove_alpha_ios: false
